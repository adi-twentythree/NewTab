<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Live New Tab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="newtab.css" />
</head>

<body>

    <video autoplay muted loop id="bg-video">
        <source src="assets/video.mp4" type="video/mp4" />
    </video>

    <div class="overlay"></div>

    <div id="clock">
        <span class="clock-time">00:00</span>
        <span class="clock-date"></span>
    </div>

    <!-- Weather widget -->
    <div class="weather-widget" id="weather-widget">
        <div class="weather-top">
            <div class="weather-top-left">
                <div class="weather-city" id="weather-location">--</div>
                <div class="weather-meta">
                    <span id="weather-high-low">H:--° L:--°</span>
                    <span class="weather-meta-dot">·</span>
                    <span id="weather-condition">--</span>
                </div>
            </div>
            <div class="weather-top-right">
                <div class="weather-temp-big" id="weather-temp">--</div>
                <div class="weather-unit">°C</div>
            </div>
        </div>

        <div class="weather-grid">
            <div class="weather-panel">
                <div class="panel-header">
                    <span class="panel-icon">
                        <svg class="icon-wind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9.59 4.59A2 2 0 1 1 11 8H2"/>
                            <path d="M15.73 8.73A2.5 2.5 0 1 1 19.5 12H2"/>
                            <path d="M9.59 19.41A2 2 0 1 0 11 16H2"/>
                        </svg>
                    </span> Wind</div>
                <div class="panel-val" id="weather-wind">-- km/h</div>
            </div>
            <div class="weather-panel">
                <div class="panel-header">
                    <span class="panel-icon">
                        <svg class="icon-drop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                        </svg>
                    </span> Humidity</div>
                <div class="panel-val" id="weather-humidity">--%</div>
            </div>
            <div class="weather-panel">
                <div class="panel-header">
                    <span class="panel-icon">
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1"     x2="12" y2="3"/>
                            <line x1="12" y1="21"    x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22"  x2="5.64"  y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1"  y1="12"    x2="3"  y2="12"/>
                            <line x1="21" y1="12"    x2="23" y2="12"/>
                            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
                            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
                        </svg>
                    </span> UV Index</div>
                <div class="panel-val-row">
                    <span class="panel-val" id="weather-uv">--</span>
                    <span class="panel-val-label" id="weather-uv-label"></span>
                </div>
            </div>
            <div class="weather-panel">
                <div class="panel-header">
                    <span class="panel-icon">
                        <svg class="icon-rain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 15.25"/>
                            <line class="rd" x1="8"  y1="19" x2="8"  y2="21"/>
                            <line class="rd" x1="16" y1="19" x2="16" y2="21"/>
                            <line class="rd" x1="12" y1="21" x2="12" y2="23"/>
                        </svg>
                    </span> Rain</div>
                <div class="panel-val" id="weather-rain">--%</div>
            </div>
        </div>
    </div>

    <div class="container">

        <div class="center-block">
            <div id="greeting" class="greeting"></div>

            <div class="search-box">
                <input id="search-input" type="text" placeholder="Search..." autofocus autocomplete="off" />
            </div>
        </div>

        <!-- FIX #1: Quick tools populated dynamically by newtab.js -->
        <div class="quick-tools" id="quick-tools"></div>

        <div class="links" id="links"></div>

    </div>

    <button id="settings-btn" aria-label="Settings">
        <svg class="settings-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
    </button>

    <iframe id="settings-frame" src="module/settings.html" title="Settings"></iframe>

    <div id="context-menu" class="context-menu">
        <button data-action="open">
            <span class="ctx-icon">
                <svg class="ctx-svg ctx-open-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
            </span>Open in new tab
        </button>
        <button data-action="edit">
            <span class="ctx-icon">
                <svg class="ctx-svg ctx-edit-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
            </span>Edit
        </button>
        <button data-action="remove" class="danger">
            <span class="ctx-icon">
                <svg class="ctx-svg ctx-remove-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
            </span>Remove
        </button>
    </div>

    <div id="edit-modal" class="glass-backdrop">
        <div class="glass-modal">

            <div class="glass-header">
                <h3>Edit Favorite</h3>
            </div>

            <div class="glass-icon-row">
                <div class="glass-icon">
                    <img id="edit-icon-preview" alt="icon preview" />
                </div>
                <label class="glass-upload">
                    Change Icon
                    <input type="file" id="edit-icon" accept="image/*" hidden />
                </label>
            </div>

            <div class="glass-field">
                <label for="edit-name">Name</label>
                <input type="text" id="edit-name" autocomplete="off" />
            </div>

            <div class="glass-field">
                <label for="edit-url">URL</label>
                <input type="url" id="edit-url" autocomplete="off" />
            </div>

            <div class="glass-colors-row">
                <div class="glass-color-item">
                    <span class="glass-color-label">Card Color</span>
                    <label class="glass-color-picker">
                        <input type="color" id="edit-color" />
                        <span class="color-preview"></span>
                    </label>
                </div>
                <div class="glass-color-item">
                    <span class="glass-color-label">Text Color</span>
                    <label class="glass-color-picker">
                        <input type="color" id="edit-text-color" />
                        <span class="color-preview"></span>
                    </label>
                </div>
            </div>

            <div class="glass-actions">
                <button id="cancel-edit" class="glass-btn ghost">Cancel</button>
                <button id="save-edit" class="glass-btn primary">Save</button>
            </div>

        </div>
    </div>

    <!-- Tool edit modal (Name + URL only — tools have no card colors) -->
    <div id="edit-tool-modal" class="glass-backdrop">
        <div class="glass-modal">

            <div class="glass-header">
                <h3>Edit Quick Tool</h3>
            </div>

            <div class="glass-field">
                <label for="edit-tool-name">Name</label>
                <input type="text" id="edit-tool-name" autocomplete="off" />
            </div>

            <div class="glass-field">
                <label for="edit-tool-url">URL</label>
                <input type="text" id="edit-tool-url" autocomplete="off" />
            </div>

            <div class="glass-actions">
                <button id="cancel-tool-edit" class="glass-btn ghost">Cancel</button>
                <button id="save-tool-edit" class="glass-btn primary">Save</button>
            </div>

        </div>
    </div>

    <script src="newtab.js"></script>
</body>

</html>
