<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>

<body>

  <div class="settings-root">

    <!-- ── Add Favorite — FIX #3: text color + FIX #4: url hint ── -->
    <section class="add-section">
      <h3>Add Favorite</h3>
      <div class="add-card">
        <div class="add-field">
          <input type="text" id="name" placeholder="Name" />
        </div>
        <div class="add-field">
          <input type="text" id="url" placeholder="example.com" />
        </div>
        <div class="add-controls">
          <!-- FIX #3: two color pickers — card color + text color -->
          <div class="add-color-group">
            <span class="add-color-label">Card</span>
            <label class="color-pill">
              <input type="color" id="color" value="#1a1a1a" />
              <span></span>
            </label>
          </div>
          <div class="add-color-group">
            <span class="add-color-label">Text</span>
            <label class="color-pill">
              <input type="color" id="text-color" value="#ffffff" />
              <span style="background:#ffffff"></span>
            </label>
          </div>
          <label class="icon-pill">
            Icon
            <input type="file" id="icon" accept="image/*" hidden />
          </label>
        </div>
        <button id="add-btn" class="primary-btn">Add</button>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- ── Quick Tools — Add only (right-click on the page to edit/remove) ── -->
    <section class="add-section">
      <h3>Quick Tools</h3>
      <div class="add-card">
        <div class="add-field">
          <input type="text" id="tool-name" placeholder="Name" />
        </div>
        <div class="add-field">
          <input type="text" id="tool-url" placeholder="example.com" />
        </div>
        <button id="add-tool-btn" class="primary-btn">Add Tool</button>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- ── Search Engine — icon-only single row ── -->
    <section class="add-section">
      <h3>Search Engine</h3>
      <div class="add-card">
        <div class="engine-options">
          <label class="engine-option">
            <input type="radio" name="engine" value="google" />
            <span class="engine-icon-btn">
              <img src="https://www.google.com/s2/favicons?domain=google.com&sz=64" alt="Google" />
            </span>
          </label>
          <label class="engine-option">
            <input type="radio" name="engine" value="duckduckgo" />
            <span class="engine-icon-btn">
              <img src="https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=64" alt="DuckDuckGo" />
            </span>
          </label>
          <label class="engine-option">
            <input type="radio" name="engine" value="bing" />
            <span class="engine-icon-btn">
              <img src="https://www.google.com/s2/favicons?domain=bing.com&sz=64" alt="Bing" />
            </span>
          </label>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- ── Background ── -->
    <section class="add-section">
      <h3>Background</h3>
      <div class="add-card">
        <label class="bg-upload-label" id="bg-upload-label">
          <input type="file" id="bg-input" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm" hidden />
          <span class="bg-upload-icon" id="bg-upload-icon">🖼</span>
          <span id="bg-label-text">Choose image or video…</span>
        </label>
        <div class="bg-actions">
          <button id="reset-bg-btn" class="ghost-btn">↩ Reset</button>
          <button id="apply-bg-btn" class="primary-btn apply-btn" disabled>Apply</button>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- ── Weather API Key ── -->
    <section class="add-section">
      <h3>Weather API Key</h3>
      <div class="add-card">
        <div class="add-field">
          <input type="text" id="api-key-input" placeholder="Paste OpenWeatherMap key…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="api-key-hint">
          Get a free key at <span class="api-link">openweathermap.org</span>
        </div>
        <button id="save-api-btn" class="primary-btn">Save Key</button>
      </div>
    </section>

  </div>

  <script src="settings.js"></script>
</body>

</html>
